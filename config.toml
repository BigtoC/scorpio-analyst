# Scorpio Analyst — default configuration
# Override with .env or environment variables (prefix: SCORPIO__, e.g. SCORPIO__LLM__MAX_DEBATE_ROUNDS=5)

[llm]
quick_thinking_provider = "anthropic"
quick_thinking_model = "claude-haiku-4-5"
deep_thinking_provider = "anthropic"
deep_thinking_model = "claude-sonnet-4-6"
max_debate_rounds = 3
max_risk_rounds = 2
agent_timeout_secs = 30

[trading]
asset_symbol = "AAPL"
backtest_start = "2024-06-01"
backtest_end = "2024-11-30"

[api]

[rate_limits]
# LLM provider rate limits (requests per minute). Set to 0 to disable.
# Check your provider dashboard for your tier's actual limits and adjust accordingly.
openai_rpm = 500
anthropic_rpm = 500
gemini_rpm = 500
copilot_rpm = 0  # No documented rate limit for Copilot ACP

# Finnhub data API rate limit (requests per second).
finnhub_rps = 30

[storage]
# Path to the SQLite snapshot database. Supports ~ and $HOME expansion.
# Override: SCORPIO__STORAGE__SNAPSHOT_DB_PATH=/your/custom/path.db
snapshot_db_path = "~/.scorpio-analyst/phase_snapshots.db"
