# Scorpio Analyst — default configuration
# Override with .env or environment variables (prefix: SCORPIO__, e.g. SCORPIO__LLM__MAX_DEBATE_ROUNDS=5)

[llm]
quick_thinking_provider = "openrouter"
quick_thinking_model = "openrouter/free"
deep_thinking_provider = "openrouter"
deep_thinking_model = "qwen/qwen3.6-plus-preview:free"
max_debate_rounds = 3
max_risk_rounds = 2
analyst_timeout_secs = 3000

[trading]
asset_symbol = "NVDA"
# Not implemented yet
backtest_start = "2024-06-01"
backtest_end = "2024-11-30"

[api]

# Per-provider LLM settings: base_url (optional) and rpm (requests per minute).
# Set rpm to 0 to disable rate limiting. Omit base_url to use the provider's default endpoint.
# Check your provider dashboard for your tier's actual limits and adjust accordingly.

[providers.openai]
#base_url = "https://my-proxy.example.com/v1"
rpm = 500

[providers.anthropic]
#base_url = "https://my-anthropic-proxy.example.com"
rpm = 500

[providers.gemini]
#base_url = "https://my-gemini-proxy.example.com"
rpm = 500

[providers.copilot]
rpm = 0  # No documented rate limit for Copilot ACP

[providers.openrouter]
#base_url = "https://my-openrouter-proxy.example.com/api/v1"
rpm = 20  # Free-tier limit; paid accounts can increase this

[rate_limits]
# Data API rate limits (requests per second).
finnhub_rps = 30
fred_rps = 2

[storage]
# Path to the SQLite snapshot database. Supports ~ and $HOME expansion.
# Override: SCORPIO__STORAGE__SNAPSHOT_DB_PATH=/your/custom/path.db
snapshot_db_path = "~/.scorpio-analyst/phase_snapshots.db"
