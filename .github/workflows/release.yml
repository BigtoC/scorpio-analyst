name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches release tag
        run: |
          TAG="${{ github.ref_name }}"
          # Enforce vx.x.x format
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$TAG' does not match the required format vx.x.x"
            exit 1
          fi

          EXPECTED="${TAG#v}"
          CARGO_VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f2)

          echo "Tag version:   $EXPECTED"
          echo "Cargo version: $CARGO_VERSION"

          if [ "$CARGO_VERSION" != "$EXPECTED" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match release tag ($TAG). Bump the version in Cargo.toml before releasing."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13  # macos-latest is now Apple Silicon; macos-13 is the last x86_64 runner
            archive_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc --no-progress

      - name: Install Protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: strip "target/${{ matrix.target }}/release/scorpio-analyst" || true

      - name: Stage binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-stage
          cp "target/${{ matrix.target }}/release/scorpio-analyst" "release-stage/scorpio"

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-stage | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\scorpio-analyst.exe" "release-stage\scorpio.exe"

      - name: Package binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="scorpio-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C release-stage scorpio
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "scorpio-${{ matrix.target }}.zip"
          Compress-Archive -Path "release-stage\scorpio.exe" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}

  publish_and_verify_release_assets:
    name: Publish installer scripts and verify release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload installer scripts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1

      - name: Verify all expected release assets exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo BigtoC/scorpio-analyst --json assets --jq '.assets[].name' > assets.txt
          cat <<'EOF' > expected.txt
          install.sh
          install.ps1
          scorpio-x86_64-unknown-linux-gnu.tar.gz
          scorpio-aarch64-unknown-linux-gnu.tar.gz
          scorpio-aarch64-apple-darwin.tar.gz
          scorpio-x86_64-apple-darwin.tar.gz
          scorpio-x86_64-pc-windows-msvc.zip
          EOF
          missing=0
          while IFS= read -r asset; do
            if ! grep -Fxq "$asset" assets.txt; then
              echo "::error::Missing release asset: $asset"
              missing=1
            fi
          done < expected.txt
          test "$missing" -eq 0
